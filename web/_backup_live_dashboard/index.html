<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroMonitor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <nav>
        <h1>HydroMonitor <span class="version">v1.0</span></h1>
        <div class="status-badge">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </nav>

    <main>
        <div class="grid-container">
            <div class="card temp-card">
                <div class="card-title">Water Temp (DS18B20)</div>
                <div class="card-value" id="tempValue">--.- °C</div>
            </div>
            
            <div class="card turb-card">
                <div class="card-title">Turbidity Index</div>
                <div class="card-value" id="turbValue">--- NTU</div>
            </div>

            <div class="card tds-card">
                <div class="card-title">TDS (Dissolved Solids)</div>
                <div class="card-value" id="tdsValue">--- ppm</div>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-header">
                <h3>Sensor Telemetry History</h3>
                <p>Live plotting of streaming ESP32 node registers</p>
            </div>
            <div class="chart-wrapper">
                <canvas id="telemetryChart"></canvas>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
